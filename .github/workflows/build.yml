name: Bitcoin order App
on:
  push:
    branches: [ master, main, 'feature/*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  ci:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [16.x]

    steps:
      - uses: actions/checkout@v4  # 更新到最新稳定版

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4  # 更新到最新稳定版
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'  # 官方推荐的npm缓存方式，比手动缓存更可靠

      - name: Install Chrome dependencies for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 ca-certificates fonts-liberation libappindicator1 libnss3 lsb-release xdg-utils wget

      - name: Install Dependencies
        run: |
          npm ci
          npm install puppeteer --save-dev  # 移到npm ci之后，确保不会被覆盖

      - name: Build
        run: |
          npm run build -- --prod

      - name: Lint
        run: |
          npm run lint

      - name: Test
        run: |
          # 使用默认的ChromeHeadless，避免自定义配置问题
          npm run test --watch=false --browsers=ChromeHeadlessNoSandbox

      - name: Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5  # 更新到最新版
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: "false"

      - name: Create Release
        uses: actions/create-release@v1
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          release_name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}

      - name: Deploy
        run: |
          npm run deploy
